<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKIJ Electric Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#eef2f7;min-height:100vh}
        .login-page{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f172a,#ff7a00)}
        .login-box{background:#fff;padding:30px;border-radius:12px;width:360px;max-width:90%;text-align:center}
        .login-box input{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:8px}
        .login-box button{width:100%;padding:12px;background:#ff7a00;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
        .portal{display:none;min-height:100vh}
        header{background:linear-gradient(135deg,#0f172a,#ff7a00);color:#fff;padding:15px 20px;display:flex;justify-content:space-between}
        .menu{display:flex;gap:10px;padding:15px}
        .menu button{padding:10px 20px;background:#0f172a;color:#fff;border:none;border-radius:8px;cursor:pointer}
        .menu button.active{background:#ff7a00}
        .section{display:none;padding:15px}
        .section.active{display:block}
        .item{background:#fff;padding:15px;margin-bottom:10px;border-radius:8px;border-left:4px solid #ff7a00}
        .item .input-group{display:flex;gap:8px;margin-top:8px}
        .item input{padding:8px;border:2px solid #ddd;border-radius:6px;flex:1}
        .item button{padding:8px 16px;background:#ff7a00;color:#fff;border:none;border-radius:6px;cursor:pointer}
        .welcome{background:#fff;padding:20px;margin:15px;border-radius:12px;text-align:center}
        #loadingOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;color:#fff;flex-direction:column;z-index:9999}
        .spinner{width:40px;height:40px;border:4px solid #fff;border-top-color:#ff7a00;border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #adminPanel{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#fff;padding:20px;overflow-y:auto;z-index:9998}
        #adminPanel>div{max-width:600px;margin:auto;background:#1a1a2e;padding:20px;border-radius:12px}
        .admin-section{background:#2a2a4a;padding:15px;margin:10px 0;border-radius:8px}
        .admin-section input,.admin-section select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #444;background:#1a1a2e;color:#fff}
        .admin-section button{padding:8px 16px;background:#ff7a00;color:#fff;border:none;border-radius:6px;cursor:pointer}
        .admin-box{background:#1a1a2e;padding:10px;margin:5px 0;border-radius:6px;border-left:3px solid #ff7a00}
        .admin-box button{padding:4px 10px;margin:2px;border:none;border-radius:4px;cursor:pointer;font-size:12px}
        .admin-box .delete-btn{background:#ff4444;color:#fff}
        .admin-box .edit-btn{background:#2196F3;color:#fff}
        .close-btn{background:#ff4444;color:#fff;padding:10px 20px;border:none;border-radius:8px;cursor:pointer}
        .toast{position:fixed;bottom:20px;right:20px;padding:12px 24px;border-radius:8px;color:#fff;z-index:99999}
        .toast.success{background:#4caf50}
        .toast.error{background:#ff4444}
        .toast.info{background:#2196F3}
        .scanner-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:10000;flex-direction:column}
        .scanner-overlay.active{display:flex}
        .scanner-overlay video{width:100%;height:100%;object-fit:cover}
        .scanner-overlay .scan-controls{position:absolute;bottom:40px;left:0;right:0;display:flex;justify-content:center;gap:30px;z-index:10}
        .scanner-overlay .scan-controls button{width:60px;height:60px;border-radius:50%;border:4px solid #ff7a00;background:#fff;cursor:pointer}
        .preview-container{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10001;padding:20px;flex-direction:column}
        .preview-container.active{display:flex}
        .preview-container img{max-height:40vh;object-fit:contain;border-radius:8px}
        .preview-container .preview-info{background:#1a1a2e;padding:15px;border-radius:8px;margin:10px 0;color:#fff;flex:1;overflow-y:auto}
        .preview-container .preview-buttons{display:flex;gap:10px}
        .preview-container .preview-buttons button{flex:1;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
        .btn-confirm{background:#4caf50;color:#fff}
        .btn-retake{background:#ff9800;color:#fff}
        .last-updated{font-size:12px;color:#888;margin-top:5px}
        .live-badge{background:#ff4444;padding:2px 10px;border-radius:20px;font-size:12px;animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        @media(max-width:600px){.menu{flex-wrap:wrap}.menu button{flex:1;min-width:70px;font-size:12px}.item .input-group{flex-direction:column}}
    </style>
</head>
<body>

<!-- লোডিং -->
<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingText">Connecting to server...</div>
</div>

<!-- লগইন পেজ -->
<div class="login-page" id="loginPage">
    <div class="login-box">
        <h2 style="color:#ff7a00;">⚡ AKIJ Electric</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p style="margin-top:10px;font-size:12px;color:#888;">Default: akij / 7070</p>
    </div>
</div>

<!-- পোর্টাল -->
<div class="portal" id="portal">
    <header>
        <h3>⚡ AKIJ Electric <span class="live-badge">LIVE</span></h3>
        <div>
            <span id="syncStatus" style="background:#4caf50;padding:4px 12px;border-radius:20px;color:#fff;font-size:12px;">Synced</span>
            <button onclick="openScanner()" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid #fff;padding:5px 12px;border-radius:6px;cursor:pointer;">📸 Scan</button>
            <button onclick="toggleAdmin()" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid #fff;padding:5px 12px;border-radius:6px;cursor:pointer;">Admin</button>
        </div>
    </header>

    <div class="welcome">
        <h2 id="slideText">Welcome To AKIJ Electric</h2>
        <h3>Total Stock: <span id="totalStock">0</span></h3>
        <div class="last-updated" id="lastUpdated">Last updated: Just now</div>
    </div>

    <div class="menu">
        <button class="active" onclick="showPage('items')">📋 Items</button>
        <button onclick="showPage('history')">📜 History</button>
    </div>

    <div id="items" class="section active"></div>
    <div id="history" class="section"><div id="historyList"></div></div>
</div>

<!-- অ্যাডমিন প্যানেল -->
<div id="adminPanel">
    <div>
        <button class="close-btn" onclick="toggleAdmin()">✖ Close</button>
        <h2 style="color:#ff7a00;">🔧 Admin</h2>
        <div class="admin-section">
            <h3>Add Item</h3>
            <input id="newItemName" placeholder="Item Name">
            <input id="newItemCode" placeholder="Item Code">
            <button onclick="addItem()">Add</button>
        </div>
        <div class="admin-section">
            <h3>Bulk Stock</h3>
            <select id="bulkItemSelect"></select>
            <input id="bulkQty" type="number" placeholder="Qty">
            <button onclick="bulkAdd()">Add Stock</button>
        </div>
        <div class="admin-section"><h3>Stock Control</h3><div id="adminList"></div></div>
        <div class="admin-section"><h3>Issue Manager</h3><div id="issueManager"></div></div>
        <div class="admin-section" style="border:2px solid #ff4444;">
            <h3 style="color:#ff4444;">Danger</h3>
            <button onclick="resetAllData()" style="background:#ff4444;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;">Reset All</button>
        </div>
    </div>
</div>

<!-- স্ক্যানার ওভারলে -->
<div class="scanner-overlay" id="scannerOverlay">
    <video id="scannerVideo" autoplay playsinline></video>
    <div style="position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;padding:8px 20px;border-radius:20px;z-index:10;" id="scanStatus">📸 Take photo</div>
    <div class="scan-controls">
        <button onclick="closeScanner()" style="background:rgba(255,68,68,0.8);color:#fff;border:none;font-size:24px;">✖</button>
        <button onclick="captureScan()" style="background:#fff;border:4px solid #ff7a00;width:70px;height:70px;">
            <div style="width:54px;height:54px;border-radius:50%;background:#ff7a00;margin:4px auto;"></div>
        </button>
        <button onclick="toggleScannerFlash()" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid #fff;font-size:20px;">💡</button>
    </div>
</div>

<!-- প্রিভিউ -->
<div class="preview-container" id="previewContainer">
    <h3 style="color:#ff7a00;">📋 Review</h3>
    <img id="previewImage" src="">
    <div class="preview-info">
        <h4>Extracted Items</h4>
        <div id="previewItems"><p style="color:#888;">Processing...</p></div>
    </div>
    <div class="preview-buttons">
        <button class="btn-confirm" onclick="confirmScanIssue()">✅ Issue</button>
        <button class="btn-retake" onclick="retakeScan()">🔄 Retake</button>
    </div>
</div>

<script>
// ========================================
// CONFIGURATION
// ========================================
const API_BASE_URL = 'https://akij-backend.onrender.com/api';
const DEFAULT_ITEMS = [
    { code: 'M001', name: 'Motor 6V' },
    { code: 'M002', name: 'Motor 12V' },
    { code: 'B001', name: 'Battery 6V' },
    { code: 'BS16', name: 'Blade Stand 16' }
];

// ========================================
// STATE
// ========================================
let items = [], issues = [], stockData = {};
let scannerStream = null, extractedItems = [], isScanning = false;

// ========================================
// DOM REFS
// ========================================
const $ = id => document.getElementById(id);
const loadingOverlay = $('loadingOverlay');
const loginPage = $('loginPage');
const portal = $('portal');
const username = $('username');
const password = $('password');
const totalStock = $('totalStock');
const itemsContainer = $('items');
const historyList = $('historyList');
const syncStatus = $('syncStatus');
const lastUpdated = $('lastUpdated');
const scannerOverlay = $('scannerOverlay');
const scannerVideo = $('scannerVideo');
const scanStatus = $('scanStatus');
const previewContainer = $('previewContainer');
const previewImage = $('previewImage');
const previewItems = $('previewItems');

// ========================================
// TOAST
// ========================================
function showToast(msg, type = 'info') {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const div = document.createElement('div');
    div.className = `toast ${type}`;
    div.textContent = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

// ========================================
// API CALLS
// ========================================
async function loadData() {
    try {
        const res = await fetch(`${API_BASE_URL}/data`);
        const result = await res.json();
        if (result.success && result.data) {
            items = result.data.items || [];
            stockData = result.data.stock || {};
            issues = result.data.issues || [];
            return true;
        }
        return false;
    } catch (e) {
        console.error('Load error:', e);
        return false;
    }
}

async function saveData() {
    try {
        const res = await fetch(`${API_BASE_URL}/data`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items, stock: stockData, issues })
        });
        const result = await res.json();
        return result.success;
    } catch (e) {
        console.error('Save error:', e);
        return false;
    }
}

// ========================================
// RENDER
// ========================================
function renderItems() {
    itemsContainer.innerHTML = '';
    if (!items || items.length === 0) {
        itemsContainer.innerHTML = '<p style="padding:20px;color:#888;">No items</p>';
        return;
    }
    items.forEach(item => {
        const stock = Number(stockData[item.code] || 0);
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <b>${item.code} | ${item.name}</b>
            <p>📦 Stock: <span id="stock_${item.code}">${stock}</span></p>
            <div class="input-group">
                <input id="name_${item.code}" placeholder="Recipient">
                <input id="issue_${item.code}" type="number" value="1" min="1" style="width:70px;">
                <button onclick="issueItem('${item.code}')">Issue</button>
            </div>
        `;
        itemsContainer.appendChild(div);
    });
    updateTotal();
}

function renderHistory() {
    historyList.innerHTML = '';
    if (!issues || issues.length === 0) {
        historyList.innerHTML = '<p style="padding:20px;color:#888;">No history</p>';
        return;
    }
    [...issues].reverse().forEach(x => {
        const div = document.createElement('div');
        div.className = 'item';
        div.style.borderLeftColor = '#2196F3';
        div.innerHTML = `
            <div style="font-size:12px;color:#888;">${x.date}</div>
            <b>👤 ${x.name}</b>
            <p>${x.item} - Qty: ${x.qty}</p>
        `;
        historyList.appendChild(div);
    });
}

function renderAdmin() {
    const adminList = $('adminList');
    adminList.innerHTML = '';
    items.forEach((item, idx) => {
        const stock = Number(stockData[item.code] || 0);
        const div = document.createElement('div');
        div.className = 'admin-box';
        div.innerHTML = `
            <b>${item.code} | ${item.name}</b> (${stock})
            <div>
                <button onclick="changeStock('${item.code}', 1)">+1</button>
                <button onclick="changeStock('${item.code}', -1)">-1</button>
                <button onclick="changeStock('${item.code}', 5)">+5</button>
                <button onclick="changeStock('${item.code}', 10)">+10</button>
                <button class="edit-btn" onclick="editItem(${idx})">✏️</button>
                <button class="delete-btn" onclick="deleteItem(${idx})">🗑️</button>
            </div>
        `;
        adminList.appendChild(div);
    });
    loadBulkSelect();
    renderIssueManager();
}

function renderIssueManager() {
    const issueManager = $('issueManager');
    issueManager.innerHTML = '';
    if (!issues || issues.length === 0) {
        issueManager.innerHTML = '<p style="color:#888;">No issues</p>';
        return;
    }
    [...issues].reverse().forEach((x, i) => {
        const realIdx = issues.length - 1 - i;
        const div = document.createElement('div');
        div.className = 'admin-box';
        div.innerHTML = `
            <b>👤 ${x.name}</b> - ${x.item} (${x.qty})
            <span style="font-size:12px;color:#888;">${x.date}</span>
            <button class="delete-btn" onclick="deleteIssue(${realIdx})">🗑️</button>
        `;
        issueManager.appendChild(div);
    });
}

function loadBulkSelect() {
    const sel = $('bulkItemSelect');
    sel.innerHTML = '';
    items.forEach(i => {
        const opt = document.createElement('option');
        opt.value = i.code;
        opt.textContent = `${i.code} | ${i.name}`;
        sel.appendChild(opt);
    });
}

function updateTotal() {
    let total = 0;
    items.forEach(i => { total += Number(stockData[i.code] || 0); });
    totalStock.textContent = total;
}

function updateLastUpdated() {
    lastUpdated.textContent = `Last updated: ${new Date().toLocaleString('bn-BD')}`;
}

function setSyncStatus(status, text) {
    syncStatus.textContent = text;
    syncStatus.style.background = status === 'online' ? '#4caf50' : status === 'offline' ? '#ff9800' : '#ff4444';
}

function renderAll() {
    renderItems();
    renderHistory();
    renderAdmin();
    updateTotal();
    updateLastUpdated();
}

// ========================================
// ITEM OPERATIONS
// ========================================
async function issueItem(code) {
    const qty = Number(document.getElementById(`issue_${code}`).value);
    const name = document.getElementById(`name_${code}`).value.trim() || 'Unknown';
    const stock = Number(stockData[code] || 0);
    if (!qty || qty <= 0) { showToast('Enter valid qty', 'error'); return; }
    if (qty > stock) { showToast(`Only ${stock} available`, 'error'); return; }
    stockData[code] = stock - qty;
    const item = items.find(i => i.code === code);
    issues.push({
        date: new Date().toLocaleString('bn-BD'),
        name: name,
        item: item ? item.name : code,
        qty: qty
    });
    await saveData();
    renderAll();
    document.getElementById(`issue_${code}`).value = '1';
    document.getElementById(`name_${code}`).value = '';
    showToast('✅ Issued!', 'success');
}

async function addItem() {
    const name = $('newItemName').value.trim();
    const code = $('newItemCode').value.trim().toUpperCase();
    if (!name || !code) { showToast('Fill all fields', 'error'); return; }
    if (items.find(i => i.code === code)) { showToast('Code exists!', 'error'); return; }
    items.push({ code, name });
    stockData[code] = 0;
    await saveData();
    renderAll();
    $('newItemName').value = '';
    $('newItemCode').value = '';
    showToast('✅ Added!', 'success');
}

async function editItem(idx) {
    const nc = prompt('New Code:', items[idx].code);
    const nn = prompt('New Name:', items[idx].name);
    if (!nc || !nn) return;
    if (nc !== items[idx].code && items.find(i => i.code === nc)) {
        showToast('Code exists!', 'error');
        return;
    }
    const old = items[idx].code;
    const st = stockData[old] || 0;
    delete stockData[old];
    items[idx] = { code: nc, name: nn };
    stockData[nc] = st;
    await saveData();
    renderAll();
    showToast('✅ Updated!', 'success');
}

async function deleteItem(idx) {
    if (!confirm('Delete this item?')) return;
    const code = items[idx].code;
    delete stockData[code];
    items.splice(idx, 1);
    await saveData();
    renderAll();
    showToast('🗑️ Deleted!', 'success');
}

async function changeStock(code, val) {
    let n = Number(stockData[code] || 0) + val;
    if (n < 0) n = 0;
    stockData[code] = n;
    await saveData();
    renderAll();
}

async function bulkAdd() {
    const code = $('bulkItemSelect').value;
    const qty = Number($('bulkQty').value);
    if (!qty || qty <= 0) { showToast('Enter valid qty', 'error'); return; }
    stockData[code] = (Number(stockData[code] || 0) + qty);
    await saveData();
    renderAll();
    $('bulkQty').value = '';
    showToast('✅ Added!', 'success');
}

async function deleteIssue(idx) {
    if (!confirm('Delete this record?')) return;
    issues.splice(idx, 1);
    await saveData();
    renderAll();
}

async function resetAllData() {
    if (!confirm('Delete ALL data?')) return;
    if (prompt('Type "RESET" to confirm:') !== 'RESET') return;
    items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    stockData = {};
    issues = [];
    await saveData();
    renderAll();
    showToast('🗑️ Reset complete!', 'success');
}

// ========================================
// LOGIN & UI
// ========================================
function login() {
    if (username.value.trim() === 'akij' && password.value.trim() === '7070') {
        loginPage.style.display = 'none';
        portal.style.display = 'block';
        loadAllData();
        startClock();
        startSlider();
    } else {
        showToast('❌ Wrong password!', 'error');
        password.value = '';
        password.focus();
    }
}

async function loadAllData() {
    loadingOverlay.style.display = 'flex';
    const ok = await loadData();
    if (ok) {
        renderAll();
        setSyncStatus('online', 'Synced');
        showToast('✅ Data loaded!', 'success');
    } else {
        items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
        stockData = {};
        issues = [];
        renderAll();
        setSyncStatus('offline', 'Offline');
        showToast('⚠️ Using default data', 'error');
    }
    loadingOverlay.style.display = 'none';
}

function startClock() {
    const update = () => {
        document.getElementById('timeDisplay')?.remove();
        const display = document.createElement('div');
        display.id = 'timeDisplay';
        display.style.fontSize = '14px';
        display.style.opacity = '0.9';
        display.textContent = new Date().toLocaleString('bn-BD');
        document.querySelector('header').appendChild(display);
    };
    update();
    setInterval(update, 1000);
}

function showPage(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.menu button[onclick*="${id}"]`)?.classList.add('active');
}

function toggleAdmin() {
    const panel = $('adminPanel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    if (panel.style.display === 'block') { renderAdmin(); }
}

// ========================================
// SCANNER
// ========================================
async function openScanner() {
    scannerOverlay.classList.add('active');
    scanStatus.textContent = '📸 Camera starting...';
    try {
        scannerStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
        });
        scannerVideo.srcObject = scannerStream;
        await scannerVideo.play();
        scanStatus.textContent = '📸 Take photo';
    } catch (e) {
        scanStatus.textContent = '❌ Camera failed';
        showToast('❌ Camera permission denied!', 'error');
    }
}

function closeScanner() {
    if (scannerStream) {
        scannerStream.getTracks().forEach(t => t.stop());
        scannerStream = null;
    }
    scannerOverlay.classList.remove('active');
}

function captureScan() {
    if (isScanning) return;
    const canvas = document.createElement('canvas');
    canvas.width = scannerVideo.videoWidth;
    canvas.height = scannerVideo.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(scannerVideo, 0, 0);
    const imageData = canvas.toDataURL('image/jpeg', 0.9);
    previewImage.src = imageData;
    previewContainer.classList.add('active');
    previewItems.innerHTML = '<p style="color:#ff9800;">⏳ Processing OCR...</p>';
    runOCR(imageData);
}

async function runOCR(imageData) {
    isScanning = true;
    try {
        const img = new Image();
        img.src = imageData;
        await new Promise(r => img.onload = r);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        const result = await Tesseract.recognize(canvas, 'eng+ben');
        extractedItems = parseItems(result.data.text);
        if (extractedItems.length === 0) {
            previewItems.innerHTML = '<p style="color:#ff9800;">❌ No items found. Try again.</p>';
            showToast('⚠️ No items found!', 'error');
        } else {
            previewItems.innerHTML = extractedItems.map((item, i) =>
                `<div class="item-row"><span>${i+1}. ${item.code}</span><span>${item.name}</span><span style="color:#ff7a00;">${item.qty}</span></div>`
            ).join('');
            showToast(`✅ ${extractedItems.length} items found!`, 'success');
        }
    } catch (e) {
        console.error(e);
        previewItems.innerHTML = '<p style="color:#ff4444;">❌ OCR failed!</p>';
        showToast('❌ OCR failed!', 'error');
    }
    isScanning = false;
}

function parseItems(text) {
    const lines = text.split('\n');
    const result = [];
    const patterns = [
        /([A-Z0-9]{2,6})\s+([A-Za-z\s]+?)\s+(\d+)/,
        /([A-Z0-9]+)\s+(\d+)\s+([A-Za-z\s]+)/
    ];
    for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.length < 3) continue;
        for (const pattern of patterns) {
            const match = trimmed.match(pattern);
            if (match) {
                let code, name, qty;
                if (trimmed.match(/^[A-Z0-9]+\s+[A-Za-z]/)) {
                    code = match[1].trim();
                    name = match[2].trim();
                    qty = parseInt(match[3]);
                } else if (trimmed.match(/^[A-Z0-9]+\s+\d+/)) {
                    code = match[1].trim();
                    qty = parseInt(match[2]);
                    name = match[3] ? match[3].trim() : code;
                } else continue;
                if (qty > 0 && qty < 9999 && code.length >= 2) {
                    const existing = result.find(i => i.code === code);
                    if (existing) existing.qty += qty;
                    else {
                        const systemItem = items.find(i => i.code === code);
                        result.push({ code, name: systemItem ? systemItem.name : name || code, qty });
                    }
                }
                break;
            }
        }
    }
    return result;
}

async function confirmScanIssue() {
    if (extractedItems.length === 0) { showToast('❌ No items!', 'error'); return; }
    const recipient = prompt('👤 Recipient name:');
    if (!recipient) return;
    for (const item of extractedItems) {
        const stock = Number(stockData[item.code] || 0);
        if (stock < item.qty) {
            showToast(`❌ Not enough ${item.code} (Stock: ${stock})`, 'error');
            return;
        }
    }
    for (const item of extractedItems) {
        stockData[item.code] = Number(stockData[item.code] || 0) - item.qty;
        issues.push({
            date: new Date().toLocaleString('bn-BD'),
            name: recipient,
            item: item.name || item.code,
            qty: item.qty
        });
    }
    await saveData();
    renderAll();
    extractedItems = [];
    previewContainer.classList.remove('active');
    closeScanner();
    showToast(`✅ ${extractedItems.length} items issued!`, 'success');
}

function retakeScan() {
    previewContainer.classList.remove('active');
    extractedItems = [];
    openScanner();
}

function toggleScannerFlash() {
    showToast('💡 Flash toggled', 'info');
}

function startSlider() {
    const slides = ['⚡ Welcome To AKIJ Electric', '📸 Scan & Issue', '👥 Everyone sees same data'];
    let i = 0;
    $('slideText').textContent = slides[0];
    setInterval(() => { i = (i + 1) % slides.length;
        $('slideText').textContent = slides[i]; }, 3000);
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        if (previewContainer.classList.contains('active')) {
            previewContainer.classList.remove('active');
            closeScanner();
        } else if (scannerOverlay.classList.contains('active')) closeScanner();
        if ($('adminPanel').style.display === 'block') toggleAdmin();
    }
});
